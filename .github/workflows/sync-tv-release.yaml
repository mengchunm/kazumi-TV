name: Sync upstream Kazumi TV release

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-tv-release
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.discover.outputs.should_build }}
      upstream_tag: ${{ steps.discover.outputs.upstream_tag }}
      tv_tag: ${{ steps.discover.outputs.tv_tag }}
      tarball_url: ${{ steps.discover.outputs.tarball_url }}
    steps:
      - name: Detect latest upstream release
        id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const upstreamOwner = 'Predidit'
            const upstreamRepo = 'Kazumi'
            const release = await github.rest.repos.getLatestRelease({
              owner: upstreamOwner,
              repo: upstreamRepo,
            })
            const upstreamTag = release.data.tag_name
            const tvTag = `tv-${upstreamTag}`

            let shouldBuild = true
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tvTag,
              })
              shouldBuild = false
            } catch (error) {
              if (error.status !== 404) throw error
            }

            core.setOutput('should_build', shouldBuild ? 'true' : 'false')
            core.setOutput('upstream_tag', upstreamTag)
            core.setOutput('tv_tag', tvTag)
            core.setOutput('tarball_url', release.data.tarball_url)

  build-and-release:
    needs: discover
    if: needs.discover.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      UPSTREAM_TAG: ${{ needs.discover.outputs.upstream_tag }}
      TV_TAG: ${{ needs.discover.outputs.tv_tag }}
      TARBALL_URL: ${{ needs.discover.outputs.tarball_url }}
      DANDANAPI_APPID: ${{ secrets.DANDANAPI_APPID }}
      DANDANAPI_KEY: ${{ secrets.DANDANAPI_KEY }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      KEYSTORE_TYPE: JKS
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout TV overlay repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Expose apksigner on PATH
        run: echo "$ANDROID_HOME/build-tools/34.0.0" >> "$GITHUB_PATH"

      - name: Download upstream source
        run: |
          rm -rf work
          mkdir -p work/upstream
          curl -L "$TARBALL_URL" | tar -xz -C work/upstream --strip-components=1

      - name: Apply TV overlay files
        run: |
          mkdir -p work/upstream/android/app/src/main/res/drawable
          cp android/app/src/main/AndroidManifest.xml work/upstream/android/app/src/main/AndroidManifest.xml
          cp android/app/src/main/res/drawable/tv_banner.xml work/upstream/android/app/src/main/res/drawable/tv_banner.xml

      - name: Inject DanDan API credentials
        if: ${{ env.DANDANAPI_APPID != '' && env.DANDANAPI_KEY != '' }}
        run: |
          sed -i "s/kvpx7qkqjh/${DANDANAPI_APPID}/g" work/upstream/lib/utils/mortis.dart
          sed -i "s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/${DANDANAPI_KEY}/g" work/upstream/lib/utils/mortis.dart

      - name: Get Flutter dependencies
        working-directory: work/upstream
        run: flutter pub get

      - name: Build Android split APKs
        working-directory: work/upstream
        run: flutter build apk --split-per-abi

      - name: Collect TV APK outputs
        run: |
          mkdir -p dist/unsigned dist/signed
          cp work/upstream/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/unsigned/Kazumi-TV_${UPSTREAM_TAG}_armeabi-v7a.apk
          cp work/upstream/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/unsigned/Kazumi-TV_${UPSTREAM_TAG}_arm64-v8a.apk

      - name: Decode Android signing key
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 -d > release.keystore

      - name: Sign APKs
        run: |
          for apk in dist/unsigned/*.apk; do
            apksigner sign \
              --ks release.keystore \
              --ks-type "$KEYSTORE_TYPE" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass pass:"$KEY_STORE_PASSWORD" \
              --out "dist/signed/$(basename "$apk")" \
              "$apk"
          done

      - name: Verify signed APKs
        run: |
          for apk in dist/signed/*.apk; do
            apksigner verify "$apk"
          done

      - name: Publish GitHub release
        run: |
          gh release create "$TV_TAG" dist/signed/*.apk \
            --title "Kazumi TV $UPSTREAM_TAG" \
            --notes "Auto-synced from Predidit/Kazumi release $UPSTREAM_TAG and rebuilt for Android TV."